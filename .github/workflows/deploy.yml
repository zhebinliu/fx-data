name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - main # 触发分支：如果您使用的是 master，请将其改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }} # GitHub Secret 里填入 root 或 ubuntu 等
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 这里的 SERVER_TARGET_PATH 是您放在云服务器上的代码所在绝对路径
            # 您需要在 GitHub Secrets 里提前配好（例如：/root/fx-data）
            cd ${{ secrets.SERVER_TARGET_PATH }}
            
            # 拉取 GitHub 上的最新代码
            echo "Pulling latest code from main branch..."
            git pull origin main
            
            # 赋予权限并执行您原本写好的 deploy.sh 脚本
            echo "Running deployment script..."
            chmod +x deploy.sh
            ./deploy.sh
            
            echo "Deploy completed successfully!"
