version: '3.8'

services:
  fxcrm-tool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fxcrm-import-tool
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    # 如果需要持久化数据，可以添加 volumes
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
